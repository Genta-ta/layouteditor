pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
}

rootProject.name = "Layout Editor"

include ':layouteditor'
include ':layouteditor:vectormaster'
project(':layouteditor:vectormaster').projectDir = file('layouteditor/vectormaster/vectormaster')
