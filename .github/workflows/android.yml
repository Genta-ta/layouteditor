name: Build & Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APKs (arm64, arm32, universal)
      run: ./gradlew assembleRelease

    - name: Build Debug APKs (arm64, arm32, universal)
      run: ./gradlew assembleDebug

    - name: List built APKs
      run: find layouteditor/build/outputs/apk -name "*.apk" -type f | sort

    - name: Upload Release APKs
      uses: actions/upload-artifact@v4
      with:
        name: release-apks
        path: layouteditor/build/outputs/apk/release/*.apk

    - name: Upload Debug APKs
      uses: actions/upload-artifact@v4
      with:
        name: debug-apks
        path: layouteditor/build/outputs/apk/debug/*.apk

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download Release APKs
      uses: actions/download-artifact@v4
      with:
        name: release-apks
        path: release-apks

    - name: Download Debug APKs
      uses: actions/download-artifact@v4
      with:
        name: debug-apks
        path: debug-apks

    - name: Rename APKs with version
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        for f in release-apks/*.apk; do
          filename=$(basename "$f")
          newname=$(echo "$filename" | sed "s/layouteditor-/LayoutEditor-${VERSION}-release-/")
          mv "$f" "release-apks/$newname"
        done
        for f in debug-apks/*.apk; do
          filename=$(basename "$f")
          newname=$(echo "$filename" | sed "s/layouteditor-/LayoutEditor-${VERSION}-debug-/")
          mv "$f" "debug-apks/$newname"
        done

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: "LayoutEditor v${{ github.ref_name }}"
        draft: false
        prerelease: true
        generate_release_notes: true
        files: |
          release-apks/*.apk
          debug-apks/*.apk
